<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridHistorico | Dashboard</title>
    <link rel="stylesheet" href="../css/dash.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="melhores()">
    <div class="dashboard-layout">

        <aside class="sidebar">
            <nav>
                <img src="../assets/icon/Logo F1.png" id="logo" alt="Logo Grid Historico">

                <div class="hello">
                    <h3>Olá, <span id="b_usuario">Driver</span>!</h3>
                </div>

                <ul class="nav-links">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="home.html">História</a></li>
                    <li><a href="evolucao.html">Evolução</a></li>
                    <li><a href="Pilotos.html">Pilotos</a></li>
                    <li><a href="Informacoes_Gerais.html">Termos</a></li>
                    <li><a href="quiz.html">Quiz</a></li>

                    <li class="btn-logout">
                        <a href="login.html"><img src="../assets/icon/Logout2.svg" id="logout" alt="Sair"></a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="dashboard-content">

            <section class="indicadores">
                <article class="kpi-card">
                    <header>
                        <h2>Ranking do Grid</h2>
                    </header>
                    <div class="ranking-lista">
                        <p id="primeiro_lugar" class="podio primeiro">1° -</p>
                        <p id="segundo_lugar" class="podio segundo">2° -</p>
                        <p id="terceiro_lugar" class="podio terceiro">3° -</p>
                    </div>
                </article>

                <article class="kpi-card">
                    <header>
                        <h2>Conhecimento</h2>
                    </header>
                    <div class="kpi-valor">
                        <p id="conhecimento_previo">Aguardando dados...</p>
                    </div>
                </article>
            </section>

            <section class="graficos-container">
                <header class="titulo_graficos">
                    <h2>Análise de Desempenho</h2>
                </header>

                <div class="graficos-grid">
                    <article class="grafico-card">
                        <h3>Pontuações (Top Pilotos)</h3>
                        <div class="canvas-wrapper">
                            <canvas id="maiores_pontuadores"></canvas>
                        </div>
                    </article>

                    <article class="grafico-card">
                        <h3>Nível de Conhecimento</h3>
                        <div class="canvas-wrapper">
                            <canvas id="conhecimento_previo_grafico"></canvas>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <script>
        function melhores() {
            b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

            fetch("/dashRoutes/melhores", {
                method: "GET"
            })
                .then(response => response.json())
                .then(dadosMelhores => {
                    console.log("Dados recebidos:", dadosMelhores);

                    let nomes_usuarios = [];
                    let pontos_usuarios = [];

                    for (let i = 0; i < dadosMelhores.length; i++) {
                        let registro = dadosMelhores[i];
                        nomes_usuarios.push(registro.Nome);
                        pontos_usuarios.push(registro.Acertos);

                        if (i == 0) primeiro_lugar.innerHTML = `1° ${registro.Nome} - ${registro.Acertos} pts`;
                        if (i == 1) segundo_lugar.innerHTML = `2° ${registro.Nome} - ${registro.Acertos} pts`;
                        if (i == 2) terceiro_lugar.innerHTML = `3° ${registro.Nome} - ${registro.Acertos} pts`;
                    }

                    const graficBar = document.getElementById('maiores_pontuadores');

                    new Chart(graficBar, {
                        type: 'bar',
                        data: {
                            labels: nomes_usuarios,
                            datasets: [{
                                label: 'Pontos no Quiz',
                                data: pontos_usuarios,
                                borderWidth: 1,
                                borderColor: '#e3b062',
                                backgroundColor: 'rgba(227, 176, 98, 0.6)', /* Cor atualizada para combinar com o tema */
                                borderRadius: 6,
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false, /* Permite que o CSS controle a altura */
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                    ticks: { color: '#fff' }
                                },
                                x: {
                                    grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                    ticks: { color: '#fff' }
                                }
                            },
                            plugins: {
                                legend: { labels: { color: '#fff' } }
                            }
                        }
                    });
                })
                .catch(erro => console.error("Erro ao carregar ranking:", erro));
        }
    </script>
</body>

</html>
