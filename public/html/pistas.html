        // Função turbinada que desenha o grid (agora aceita um termo de filtro)
        function carregarGrid(filtro = "") {
            const grid = document.getElementById("grid_circuitos");
            grid.innerHTML = ""; // Limpa antes de carregar

            // Transforma o que o usuário digitou em minúsculo pra não ter erro de Case Sensitive
            const termo = filtro.toLowerCase();

            // O filtro mágico do Javascript
            const pistasFiltradas = listaPistas.filter(pista =>
                pista.nome.toLowerCase().includes(termo) ||
                pista.pais.toLowerCase().includes(termo)
            );

            // Mensagem amigável caso o usuário digite algo que não existe
            if (pistasFiltradas.length === 0) {
                grid.innerHTML = `<p style="text-align:center; grid-column: 1 / -1; color: #ccc; font-size: 1.2rem; font-family: 'Barlow', sans-serif;">Nenhuma pista encontrada para "${filtro}".</p>`;
                return;
            }

            // Desenha as pistas que passaram no filtro
            pistasFiltradas.forEach(pista => {
                // Descobre o ID original para o Modal não abrir a pista errada
                const indexOriginal = listaPistas.findIndex(p => p.id === pista.id);

                grid.innerHTML += `
                    <article class="pista-card" onclick="abrirModal(${indexOriginal})">
                        <div class="pista-img-container">
                            <img src="${pista.imagem}" alt="Foto de ${pista.nome}" onerror="this.src='../assets/imgs/fundo_dash8.jpg'">
                        </div>
                        <div class="pista-legenda">
                            <h3>${pista.nome}</h3>
                            <span>${pista.pais}</span>
                        </div>
                    </article>
                `;
            });
        }

        // Função que é acionada toda vez que o usuário solta uma tecla (onkeyup)
        function filtrarPistas() {
            const termoBuscado = document.getElementById("busca_pista").value;
            carregarGrid(termoBuscado);
        }

        // Inicia a renderização assim que a página carrega (com filtro vazio, mostrando tudo)
        window.onload = () => carregarGrid();

        // Funções do Modal (Abre e injeta os dados)
        function abrirModal(index) {
            const pista = listaPistas[index];

            document.getElementById("modal_nome").innerText = pista.nome;
            document.getElementById("modal_pais").innerText = pista.pais;
            document.getElementById("modal_recorde").innerText = pista.recorde;
            document.getElementById("modal_corridas").innerText = pista.corridas;
            document.getElementById("modal_vencedor").innerText = pista.vencedor;
            document.getElementById("modal_entrada").innerText = pista.entrada;
            document.getElementById("modal_saida").innerText = pista.saida;

            document.getElementById("modal_pista").classList.add("ativo");
        }

        function fecharModal() {
            document.getElementById("modal_pista").classList.remove("ativo");
        }

        // Inicia a renderização assim que a página carrega
        window.onload = carregarGrid;
    </script>
</body>

</html>
